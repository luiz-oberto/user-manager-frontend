<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuário</title>

    <!-- Bootstrap LOCAL -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="css/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>

<body>

<div class="app-layout">

    <!-- SIDEBAR -->
    <aside id="sidebar"></aside>

    <!-- MAIN -->
    <div class="main-wrapper">

        <!-- TOPBAR -->
        <header id="topbar"></header>

        <!-- CONTENT -->
        <main class="page-content">

            <div class="page-header mb-4">
                <h2 class="page-title">Editar usuário</h2>
                <p class="page-subtitle">
                    Atualize os dados do usuário ou remova-o do sistema.
                </p>
            </div>

            <div class="content-card">

                <form id="editUserForm">
                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">Nome</label>
                            <input id="nome" class="form-control" placeholder="Nome do usuário">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input id="email" class="form-control" placeholder="Email do usuário">
                        </div>

                    </div>

                    <!-- AÇÕES -->
                    <div class="mt-4 d-flex flex-wrap gap-3 justify-content-between">

                        <div class="d-flex gap-3">
                            <button id="updateUserBtn" type="button" class="btn btn-primary-soft">
                                <i class="bi bi-check-lg"></i> Salvar alterações
                            </button>

                            <a href="dashboard.html" class="btn btn-light border">
                                Cancelar
                            </a>
                        </div>

                        <button id="deleteUserBtn" type="button" class="btn btn-outline-danger">
                            <i class="bi bi-trash"></i> Deletar usuário
                        </button>

                    </div>
                </form>

            </div>

        </main>
    </div>
</div>

<!-- ALERT -->
<div id="alertContainer" class="alert-container"></div>

<!-- JS -->
<script src="js/api.js"></script>
<script src="js/alerts.js"></script>
<script src="js/auth-utils.js"></script>
<script src="js/layout.js"></script>
<script src="js/userService.js"></script>
<script src="js/user.js"></script>
<script src="js/pages/edit.js"></script>
<script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
