<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body onload="loadProfile()">

<div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- MAIN -->
    <div class="main-wrapper">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-left">
                <h4 class="mb-0">Meu Perfil</h4>
            </div>

            <div class="topbar-right">
                <button onclick="logout()" class="btn btn-logout">
                    <i class="bi bi-box-arrow-right"></i>
                    Sair
                </button>
            </div>
        </header>

        <!-- CONTENT -->
        <main class="page-content">

            <div class="page-header mb-4">
                <h2 class="page-title">Informações do usuário</h2>
                <p class="page-subtitle">Visualize os dados da sua conta.</p>
            </div>

            <div class="content-card">

                <!-- PERFIL -->
                <div id="profile" class="profile-box">
                    <!-- preenchido via JS -->
                </div>

                <!-- AÇÕES -->
                <div class="mt-4 d-flex gap-3 flex-wrap">
                    <!-- <a href="dashboard.html" class="btn btn-light border">
                        Voltar
                    </a> -->

                    <div id="actionButton"></div>
                </div>

            </div>

        </main>
    </div>
</div>

<!-- ALERT -->
<div id="alertContainer" class="alert-container"></div>

<script src="js/auth-utils.js"></script>
<script src="js/layout.js"></script>
<script src="js/api.js"></script>
<script src="js/profile.js"></script>
<script src="js/alerts.js"></script>

<script>
function logout() {
    localStorage.removeItem("token");
    window.location.href = "index.html";
}
</script>

</body>
</html>
