<!DOCTYPE html>
<html lang="pt-BR">
<head>

                <!-- PERFIL -->

                <!-- AÇÕES -->
                <div class="mt-4 d-flex gap-3 flex-wrap">
                    <div id="actionButton"></div>
                </div>

            </div>

        </main>
    </div>
</div>

<!-- ALERT -->
<div id="alertContainer" class="alert-container"></div>

<!-- JS -->
<script src="js/api.js"></script>
<script src="js/alerts.js"></script>
<script src="js/auth-utils.js"></script>
