<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Usuário</title>

   <!-- Bootstrap -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="css/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-layout">

    <!-- SIDEBAR -->
    <aside id="sidebar"></aside>

    <!-- MAIN -->
    <div class="main-wrapper">

        <!-- TOPBAR (controlado pelo layout.js) -->
        <header id="topbar"></header>

        <!-- CONTENT -->
        <main class="page-content">

            <div class="page-header mb-4">
                <h2 class="page-title">Novo usuário</h2>
                <p class="page-subtitle">
                    Preencha os dados para cadastrar um novo usuário no sistema.
                </p>
            </div>

            <div class="content-card">
                <form id="createUserForm">
                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">Nome</label>
                            <input id="nome" class="form-control" placeholder="Digite o nome">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input id="email" class="form-control" placeholder="Digite o email">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Senha</label>
                            <input id="senha" type="password" class="form-control" placeholder="Digite a senha">
                        </div>

                    </div>

                    <div class="mt-4 d-flex gap-3">
                        <button id="createUserBtn" type="button" class="btn btn-primary-soft">
                            <i class="bi bi-check-lg"></i> Criar usuário
                        </button>

                        <a href="dashboard.html" class="btn btn-light border">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>

        </main>
    </div>
</div>

<!-- ALERTS -->
<div id="alertContainer" class="alert-container"></div>

<!-- JS (ordem IMPORTANTE) -->
<script src="js/api.js"></script>
<script src="js/alerts.js"></script>
<script src="js/auth-utils.js"></script>
<script src="js/layout.js"></script>
<script src="js/user.js"></script>
<script src="js/pages/create.js"></script>
<script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
