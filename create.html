<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Usuário</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body onload="checkSuperUserAccess()">

<div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-people-fill"></i>
            <span>UserManager</span>
        </div>

        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-item">
                <i class="bi bi-grid-1x2-fill"></i>
                <span>Dashboard</span>
            </a>

            <a href="create.html" class="menu-item active">
                <i class="bi bi-person-plus-fill"></i>
                <span>Novo Usuário</span>
            </a>

            <a href="profile.html" class="menu-item">
                <i class="bi bi-person-circle"></i>
                <span>Meu Perfil</span>
            </a>
        </nav>
    </aside>

    <!-- MAIN -->
    <div class="main-wrapper">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-left">
                <h4 class="mb-0">Criar Usuário</h4>
            </div>

            <div class="topbar-right">
                <button onclick="logout()" class="btn btn-logout">
                    <i class="bi bi-box-arrow-right"></i>
                    Sair
                </button>
            </div>
        </header>

        <!-- CONTENT -->
        <main class="page-content">

            <div class="page-header mb-4">
                <h2 class="page-title">Novo usuário</h2>
                <p class="page-subtitle">Preencha os dados para cadastrar um novo usuário no sistema.</p>
            </div>

            <div class="content-card">
                <form id="createUserForm">
                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">Nome</label>
                            <input id="nome" class="form-control" placeholder="Digite o nome">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input id="email" class="form-control" placeholder="Digite o email">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Senha</label>
                            <input id="senha" type="password" class="form-control" placeholder="Digite a senha">
                        </div>

                    </div>

                    <div class="mt-4 d-flex gap-3">
                        <button type="button" onclick="createUser()" class="btn btn-primary-soft">
                            <i class="bi bi-check-lg"></i> Criar usuário
                        </button>

                        <a href="dashboard.html" class="btn btn-light border">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>

        </main>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/user.js"></script>
<script src="js/alerts.js"></script>

<script>
function logout() {
    localStorage.removeItem("token");
    window.location.href = "index.html";
}
</script>

<div id="alertContainer" class="alert-container"></div>

</body>
</html>
