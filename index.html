<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Bootstrap LOCAL recomendado futuramente -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>

<body class="auth-page">

<div class="auth-card">

    <div class="text-center mb-4">
        <h2 class="auth-title">UserManager</h2>
        <p class="auth-subtitle">Acesse sua conta</p>
    </div>

    <!-- FORM -->
    <form id="loginForm">

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="email" class="form-control" placeholder="Digite seu email">
        </div>

        <div class="mb-3">
            <label class="form-label">Senha</label>
            <input id="senha" type="password" class="form-control" placeholder="Digite sua senha">
        </div>

        <button id="loginBtn" type="submit" class="btn btn-primary-soft w-100">
            Entrar
        </button>

    </form>

</div>

<!-- ALERT -->
<div id="alertContainer" class="alert-container"></div>

<!-- JS -->
<script src="js/api.js"></script>
<script src="js/alerts.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
