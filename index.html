<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body class="auth-page">

<div class="auth-card">

    <div class="text-center mb-4">
        <h2 class="auth-title">UserManager</h2>
        <p class="auth-subtitle">Acesse sua conta</p>
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input id="email" class="form-control" placeholder="Digite seu email">
    </div>

    <div class="mb-3">
        <label class="form-label">Senha</label>
        <input id="senha" type="password" class="form-control" placeholder="Digite sua senha">
    </div>

    <button onclick="login()" class="btn btn-primary-soft w-100">
        Entrar
    </button>

</div>

<!-- ALERT -->
<div id="alertContainer" class="alert-container"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/alerts.js"></script>

</body>
</html>
