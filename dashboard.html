<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body onload="initDashboard()">

<div class="app-layout">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-people-fill"></i>
            <span>UserManager</span>
        </div>

        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-item active">
                <i class="bi bi-grid-1x2-fill"></i>
                <span>Dashboard</span>
            </a>

            <a href="create.html" class="menu-item">
                <i class="bi bi-person-plus-fill"></i>
                <span>Novo Usuário</span>
            </a>

            <a href="profile.html" class="menu-item">
                <i class="bi bi-person-circle"></i>
                <span>Meu Perfil</span>
            </a>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <h4 class="mb-0">Painel de Usuários</h4>
            </div>

            <div class="topbar-right">
                <div class="search-box">
                    <i class="bi bi-search"></i>
                    <input type="text" placeholder="Pesquisar usuário...">
                </div>

                <button onclick="logout()" class="btn btn-logout">
                    <i class="bi bi-box-arrow-right"></i>
                    Sair
                </button>
            </div>
        </header>

        <main class="page-content">
            <div class="page-header mb-4">
                <h2 class="page-title">Usuários</h2>
                <p class="page-subtitle">Gerencie os usuários cadastrados no sistema.</p>
            </div>

            <div class="content-card">
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                    <h5 class="mb-0">Lista de usuários</h5>
                    <a href="create.html" class="btn btn-primary-soft">
                        <i class="bi bi-plus-lg"></i> Novo Usuário
                    </a>
                </div>

                <div class="table-responsive">
                    <table class="table custom-table align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Email</th>
                                <th class="text-end">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="userTable"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/alerts.js"></script>
<script>
function logout() {
    localStorage.removeItem("token");
    window.location.href = "index.html";
}
</script>

<div id="alertContainer" class="alert-container"></div>

</body>
</html>
